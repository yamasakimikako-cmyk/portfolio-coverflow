<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .detail-page {
      min-height: 100vh;
      padding: 72px 24px 80px;
      max-width: 1040px;
      margin: 0 auto;
      color: #f3f3f3;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 44px;
      font-family: "Courier New", Courier, monospace;
      color: rgba(255,255,255,0.75);
    }

    .detail-label {
      font-size: 14px;
      letter-spacing: 0.08em;
      margin-bottom: 18px;
    }

    .detail-title {
      margin: 0 0 24px;
      font-size: clamp(30px, 5vw, 48px);
      font-weight: 300;
      line-height: 1.2;
      color: #fff;
    }

    .detail-summary {
      font-size: 16px;
      line-height: 1.9;
      max-width: 760px;
      color: rgba(255,255,255,0.82);
    }

    .detail-back {
      color: rgba(255,255,255,0.78);
      text-decoration: none;
      white-space: nowrap;
    }

    .detail-image {
      width: 100%;
      background: #111;
      margin-top: 28px;
    }

    .detail-image img {
      width: 100%;
      height: auto;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <main class="detail-page">
    <div class="detail-top">
      <div>
        <div class="detail-label" id="projectMeta">PROJECT</div>
        <h1 class="detail-title" id="projectTitle">Project Title</h1>
        <div class="detail-summary" id="projectSummary">
          项目详情内容将在这里显示。
        </div>
      </div>

      <a class="detail-back" href="index.html">
        [ RETURN_TO_ARCHIVE ]
      </a>
    </div>

    <div class="detail-image" id="projectImage"></div>
  </main>

  <script src="js/data.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const slug = params.get("slug");
    const items = window.PROJECTS || [];
    const current = items.find(item => item.slug === slug) || items[0];

    document.getElementById("projectTitle").textContent =
      current?.title || "Untitled Project";

    document.getElementById("projectSummary").textContent =
      "这里是项目详情占位内容。下一步我会带你改造成后台可插入图片、文字、模块的动态页面。";

    document.getElementById("projectImage").innerHTML =
      current?.cover
        ? `<img src="${current.cover}" alt="${current.title}">`
        : "";
  </script>
</body>
</html>
